<!DOCTYPE html>
<html lang="en">
<head>

    <title>Amanda Dech, FNP-C | Wellness & Aesthetics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        
        :root { 
            --purple: #6B4E71; 
            --sage: #929C92; 
            --lavender: #F3EAF4;
        }

        .font-serif { font-family: 'Playfair Display', serif; }
        .font-sans { font-family: 'Inter', sans-serif; }
        
        /* Glassmorphism Effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Animated Background Blobs */
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(107, 78, 113, 0.1) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(60px);
        }
    </style>
</head>
<body class="bg-white font-sans overflow-x-hidden">

    <div class="blob top-0 -left-20 animate-pulse"></div>

    <div class="relative flex flex-col md:flex-row min-h-[90vh]">
